<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Geburtstag</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="bg" id="bg">
            <span class="orb o1"></span>
            <span class="orb o2"></span>
            <span class="orb o3"></span>
            <span class="orb o4"></span>
            <span class="grid"></span>
        </div>

        <main class="wrap">
            <header class="hero">
                <div class="badge">49</div>
                <p class="eyebrow">
                    Diese Seite ist ein Projekt von MagicBlueEntity.
                    <a href="https://github.com/magicblueentity"
                        >Mehr erfahren</a
                    >
                </p>
                <h1>
                    Alles Gute zum Geburtstag,
                    <span class="glow">Papa!</span>
                </h1>
                <p class="sub"></p>
                <div class="cta">
                    <button class="btn primary" id="confettiBtn">
                        Konfetti nachfeuern
                    </button>
                    <button class="btn ghost" id="lightBtn">Lichtshow</button>
                </div>
            </header>
        </main>

        <div class="stars" id="stars"></div>
        <div class="confetti" id="confetti"></div>
        <div class="spotlight" id="spotlight"></div>

        <script src="script.js"></script>
    </body>
</html>
